<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OdhoShop - L'électronique pour tous</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    import React, { useState } from 'react';
    
    export default function EcommerceSite() {
      const [currentSlide, setCurrentSlide] = useState(0);
      const [cartCount, setCartCount] = useState(0);
      const [menuOpen, setMenuOpen] = useState(false);

      const products = [
        { id: 1, name: 'Écouteurs Accessibles', price: '8999 CFA', image: '🎧', rating: 4.5 },
        { id: 2, name: 'Montre pour Tous', price: '19999 CFA', image: '⌚', rating: 4.8 },
        { id: 3, name: 'Caméra Simple', price: '29999 CFA', image: '📷', rating: 4.7 },
        { id: 4, name: 'Batterie Fiable', price: '4999 CFA', image: '🔋', rating: 4.6 },
        { id: 5, name: 'Clavier Durable', price: '12999 CFA', image: '⌨️', rating: 4.9 },
        { id: 6, name: 'Souris Confortable', price: '5999 CFA', image: '🖱️', rating: 4.4 },
      ];

      const nextSlide = () => setCurrentSlide((prev) => (prev + 1) % products.length);
      const prevSlide = () => setCurrentSlide((prev) => (prev - 1 + products.length) % products.length);
      const addToCart = () => setCartCount(cartCount + 1);

      return (
        <div className="min-h-screen bg-gradient-to-b from-white to-orange-50">
          {/* Header */}
          <header className="bg-white shadow-sm sticky top-0 z-50 border-b-4 border-orange-500">
            <div className="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
              <div className="flex flex-col">
                <div className="text-3xl font-bold bg-gradient-to-r from-orange-500 to-blue-600 bg-clip-text text-transparent">
                  OdhoShop
                </div>
                <p className="text-xs text-orange-600 font-semibold">L'électronique pour tous</p>
              </div>
              
              <nav className="hidden md:flex gap-8">
                <a href="#" className="text-gray-700 hover:text-orange-500 font-semibold">Accueil</a>
                <a href="#" className="text-gray-700 hover:text-orange-500 font-semibold">Produits</a>
                <a href="#" className="text-gray-700 hover:text-orange-500 font-semibold">Nos Valeurs</a>
                <a href="#" className="text-gray-700 hover:text-orange-500 font-semibold">Communauté</a>
              </nav>

              <div className="flex items-center gap-4">
                <div className="relative cursor-pointer">
                  <span className="text-2xl">🛒</span>
                  {cartCount > 0 && (
                    <span className="absolute -top-2 -right-2 bg-blue-600 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold">
                      {cartCount}
                    </span>
                  )}
                </div>
              </div>
            </div>
          </header>

          {/* Hero Banner */}
          <section className="bg-gradient-to-r from-orange-500 via-blue-600 to-orange-600 text-white py-16">
            <div className="max-w-7xl mx-auto px-4 text-center">
              <h1 className="text-4xl font-bold mb-4">Bienvenue chez OdhoShop</h1>
              <p className="text-lg opacity-95 max-w-2xl mx-auto">
                Nous croyons que la technologie doit être accessible à chacun d'entre nous. 
                Chez OdhoShop, pas de jargon compliqué, pas de prix cachés. Juste de bons produits, 
                à des prix justes, pour tous.
              </p>
            </div>
          </section>

          {/* Values Section */}
          <section className="max-w-7xl mx-auto px-4 py-12">
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
              <div className="bg-white rounded-lg p-6 shadow-md border-l-4 border-orange-500 text-center">
                <div className="text-4xl mb-4">👥</div>
                <h3 className="font-bold text-lg text-gray-800 mb-2">Pour Tous</h3>
                <p className="text-gray-600 text-sm">Peu importe votre budget, il y a quelque chose pour vous.</p>
              </div>
              <div className="bg-white rounded-lg p-6 shadow-md border-l-4 border-blue-600 text-center">
                <div className="text-4xl mb-4">⚡</div>
                <h3 className="font-bold text-lg text-gray-800 mb-2">Qualité Garantie</h3>
                <p className="text-gray-600 text-sm">Tous nos produits sont testés et vérifiés.</p>
              </div>
              <div className="bg-white rounded-lg p-6 shadow-md border-l-4 border-orange-500 text-center">
                <div className="text-4xl mb-4">❤️</div>
                <h3 className="font-bold text-lg text-gray-800 mb-2">Transparence</h3>
                <p className="text-gray-600 text-sm">Pas de surprises. Prix clairs et honnêtes.</p>
              </div>
            </div>
          </section>

          {/* Products Grid */}
          <section className="max-w-7xl mx-auto px-4 py-12">
            <h2 className="text-3xl font-bold mb-8 text-gray-800">Tous nos Produits</h2>
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
              {products.map((product) => (
                <div key={product.id} className="bg-white rounded-lg shadow-md hover:shadow-lg border-2 border-orange-200">
                  <div className="bg-gradient-to-b from-blue-50 to-orange-50 p-8 text-center text-6xl">
                    {product.image}
                  </div>
                  <div className="p-4">
                    <h3 className="font-bold text-lg text-gray-800 mb-2">{product.name}</h3>
                    <p className="text-gray-600 mb-2">⭐ {product.rating}/5</p>
                    <p className="text-2xl font-bold text-orange-500 mb-4">{product.price}</p>
                    <button 
                      onClick={addToCart}
                      className="w-full bg-gradient-to-r from-orange-500 to-blue-600 text-white py-2 rounded-lg font-semibold hover:shadow-lg"
                    >
                      Ajouter au panier
                    </button>
                  </div>
                </div>
              ))}
            </div>
          </section>

          {/* Community Section */}
          <section className="bg-gradient-to-r from-orange-100 to-blue-100 py-12 my-12">
            <div className="max-w-7xl mx-auto px-4 text-center">
              <h2 className="text-3xl font-bold text-gray-800 mb-4">Rejoignez Notre Communauté</h2>
              <p className="text-gray-700 mb-6">Partagez vos expériences et apprenez ensemble.</p>
              <button className="bg-gradient-to-r from-orange-500 to-blue-600 text-white px-8 py-3 rounded-lg font-semibold">
                Rejoindre la Communauté
              </button>
            </div>
          </section>

          {/* Footer */}
          <footer className="bg-gray-800 text-white py-8 border-t-4 border-orange-500">
            <div className="max-w-7xl mx-auto px-4 text-center">
              <p className="text-sm text-gray-400">&copy; 2026 OdhoShop. Tous droits réservés.</p>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<EcommerceSite />);
  </script>
</body>
</html>
